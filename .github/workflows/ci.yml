name: CI Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Configure CMake
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build --config Release

      - name: Run hello_world (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          chmod +x build/hello_world/hello_world
          ./build/hello_world/hello_world
        shell: bash

      - name: Run solver (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          chmod +x build/solver/solver
          echo "1 -5 6" | ./build/solver/solver
        shell: bash

      - name: Run hello_world (Windows)
        if: matrix.os == 'windows-latest'
        run: .\build\hello_world\Release\hello_world.exe
        shell: pwsh

      - name: Run solver (Windows)
        if: matrix.os == 'windows-latest'
        run: echo "1 -5 6" | .\build\solver\Release\solver.exe
        shell: pwsh
