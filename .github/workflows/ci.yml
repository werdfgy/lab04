name: CI Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            compiler: gcc
            cc: gcc
            cxx: g++
          - os: ubuntu-latest
            compiler: clang
            cc: clang
            cxx: clang++
          - os: windows-latest
            compiler: msvc
            cc: cl
            cxx: cl

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install compilers for Linux
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc g++ clang

      - name: Configure CMake
        run: |
          cmake -S . -B build -DCMAKE_BUILD_TYPE=Release -DCMAKE_C_COMPILER=${ matrix.cc } -DCMAKE_CXX_COMPILER=${ matrix.cxx }
        shell: bash

      - name: Build
        run: cmake --build build --config Release

      - name: Run hello_world (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          chmod +x build/hello_world/hello_world
          ./build/hello_world/hello_world
        shell: bash

      - name: Run solver (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          chmod +x build/solver/solver
          echo "1 -5 6" | ./build/solver/solver
        shell: bash

      - name: Run hello_world (Windows)
        if: matrix.os == 'windows-latest'
        run: .\build\hello_world\Release\hello_world.exe
        shell: pwsh

      - name: Run solver (Windows)
        if: matrix.os == 'windows-latest'
        run: echo "1 -5 6" | .\build\solver\Release\solver.exe
        shell: pwsh
